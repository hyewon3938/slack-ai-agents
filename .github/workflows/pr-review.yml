name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.mjs' '*.json' ':!package-lock.json' ':!yarn.lock' | head -3000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get conventions
        id: conventions
        run: |
          if [ -f docs/conventions.md ]; then
            CONV=$(head -100 docs/conventions.md)
          else
            CONV="컨벤션 파일 없음"
          fi
          echo "conventions<<EOF" >> $GITHUB_OUTPUT
          echo "$CONV" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        uses: anthropics/anthropic-ai-action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          prompt: |
            당신은 코드 리뷰어입니다. 아래 PR의 변경사항을 리뷰해주세요.

            ## 프로젝트 컨벤션
            ${{ steps.conventions.outputs.conventions }}

            ## PR 정보
            - 제목: ${{ github.event.pull_request.title }}
            - 브랜치: ${{ github.head_ref }} → ${{ github.base_ref }}

            ## 변경사항 (diff)
            ```
            ${{ steps.diff.outputs.diff }}
            ```

            ## 리뷰 기준
            1. **버그 위험**: 잠재적 버그, edge case 누락, 에러 핸들링
            2. **보안**: 민감 정보 노출, 인젝션 위험, env 하드코딩
            3. **성능**: 불필요한 연산, N+1 쿼리
            4. **컨벤션 준수**: 위 컨벤션 파일 기준으로 네이밍, 구조, 패턴 체크
            5. **컨벤션 업데이트 필요**: 실제 코드 패턴과 컨벤션이 다르면 컨벤션 수정 제안

            ## 출력 형식
            심각도별 분류:
            - 🔴 필수 수정: 버그, 보안 이슈
            - 🟡 권장: 코드 품질 개선
            - 🟢 참고: 스타일, 제안

            컨벤션 업데이트가 필요하면 별도 섹션으로:
            - 📘 컨벤션 업데이트 제안: 어떤 규칙을 왜 바꿔야 하는지

            이슈가 없으면 "리뷰 완료, 이슈 없음 ✅" 로 간결하게 마무리.
