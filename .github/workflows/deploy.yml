name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

  build-image:
    name: Build and Push Image
    needs: ci
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: Deploy to Server
    needs: build-image
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify deploy start
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | jq -Rs '.[:-1]')
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an' | jq -Rs '.[:-1]')
          COMMIT_SHA=$(git log -1 --pretty=format:'%h')
          ACTIONS_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg sha "$COMMIT_SHA" \
            --argjson msg "$COMMIT_MSG" \
            --argjson author "$COMMIT_AUTHOR" \
            --arg url "$ACTIONS_URL" \
            '{blocks: [
              {type: "section", text: {type: "mrkdwn", text: (":rocket: *배포 시작*\n`" + $sha + "` " + $msg + "\n_by " + $author + "_")}},
              {type: "context", elements: [{type: "mrkdwn", text: ("<" + $url + "|Actions 로그>")}]}
            ]}' | curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' -d @-

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: bash ~/deploy.sh

      - name: Notify deploy success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        run: |
          COMMIT_SHA=$(git log -1 --pretty=format:'%h')
          jq -n --arg sha "$COMMIT_SHA" \
            '{blocks: [{type: "section", text: {type: "mrkdwn", text: (":white_check_mark: *배포 완료* `" + $sha + "`")}}]}' \
            | curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' -d @-

      - name: Notify deploy failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          COMMIT_SHA=$(git log -1 --pretty=format:'%h')
          ACTIONS_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n --arg sha "$COMMIT_SHA" --arg url "$ACTIONS_URL" \
            '{blocks: [{type: "section", text: {type: "mrkdwn", text: (":x: *배포 실패* `" + $sha + "`\n<" + $url + "|에러 로그 확인>")}}]}' \
            | curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' -d @-

  notify-pipeline-failure:
    name: Notify Pipeline Failure
    needs: [ci, build-image]
    if: failure()
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify pipeline failure
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | jq -Rs '.[:-1]')
          COMMIT_SHA=$(git log -1 --pretty=format:'%h')
          ACTIONS_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg sha "$COMMIT_SHA" \
            --argjson msg "$COMMIT_MSG" \
            --arg url "$ACTIONS_URL" \
            '{blocks: [{type: "section", text: {type: "mrkdwn", text: (":warning: *CI/빌드 실패* (배포 중단)\n`" + $sha + "` " + $msg + "\n<" + $url + "|에러 로그 확인>")}}]}' \
            | curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' -d @-
