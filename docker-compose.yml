services:
  db:
    image: postgres:17-alpine
    container_name: slack-ai-agents-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REDACTED_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-slack_ai_agents}
    # ports:
    #   - '5432:5432'  # 로컬 개발 시에만 활성화
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: slack-ai-agents
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build: ./web
    container_name: slack-ai-agents-web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-REDACTED_PASSWORD}@db:5432/${POSTGRES_DB:-slack_ai_agents}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/auth').then(r => process.exit(r.ok || r.status === 401 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
