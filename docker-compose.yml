services:
  db:
    image: postgres:17-alpine
    container_name: slack-ai-agents-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-slack_ai_agents}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pg-ssl/server.crt:/var/lib/postgresql/server.crt:ro
      - ./pg-ssl/server.key:/var/lib/postgresql/server.key:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=32MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/server.crt"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/server.key"
      - "-c"
      - "listen_addresses=*"

  app:
    image: ghcr.io/hyewon3938/slack-ai-agents:latest
    container_name: slack-ai-agents
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3100:3100"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
